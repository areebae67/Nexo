        /* ══ FEED ══ */
        function Feed({ setPage, setTask, saved, onSave, showToast }) {
            const [cat, setCat] = useState('All');
            const [sort, setSort] = useState('default');
            const [maxBudget, setMaxBudget] = useState(15000);
            const [maxDist, setMaxDist] = useState(5);
            const [showFilters, setShowFilters] = useState(false);
            const cats = ['All', 'Cleaning', 'Repair', 'Delivery', 'Tutoring', 'Moving', 'Gardening', 'Tech Help'];
            let list = cat === 'All' ? TASKS : TASKS.filter(t => t.cat === cat);
            list = list.filter(t => t.budget <= maxBudget && t.dist <= maxDist);
            if (sort === 'budget-lo') list = [...list].sort((a, b) => a.budget - b.budget);
            if (sort === 'budget-hi') list = [...list].sort((a, b) => b.budget - a.budget);
            if (sort === 'dist') list = [...list].sort((a, b) => a.dist - b.dist);
            return (
                <div className="page" style={{ maxWidth: 1100, margin: '0 auto', padding: '44px 48px' }}>
                    <div className="between" style={{ marginBottom: 28 }}>
                        <div>

                        </div>
                        <div className="row">
                            <select className="fselect" style={{ width: 'auto', padding: '9px 36px 9px 14px', fontSize: 13 }} value={sort} onChange={e => setSort(e.target.value)}>

                                <option value="budget-hi">Budget: High to Low</option>
                                <option value="budget-lo">Budget: Low to High</option>
                                <option value="dist">Distance: Nearest</option>

        /* ══ POST TASK ══ */

                <div className="page" style={{ maxWidth: 560, margin: '80px auto', padding: '0 48px', textAlign: 'center' }}>
                    <div style={{ width: 80, height: 80, background: '#E8FAF3', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 36, margin: '0 auto 24px' }}>🎉</div>

                        </div>
                    )}
                </div>
            );

        function Profile({ showToast }) {
            const u = USERS[0];
            const [tab, setTab] = useState('tasks');
            return (
                <div className="page" style={{ maxWidth: 960, margin: '0 auto', padding: '50px 48px' }}>
                    <div style={{ display: 'grid', gridTemplateColumns: '260px 1fr', gap: 36 }}>
                        <div>
                            <div className="card-flat" style={{ textAlign: 'center', padding: 32, marginBottom: 18 }}>
                                <div className="av" style={{ width: 76, height: 76, fontSize: 27, margin: '0 auto 16px', border: '3px solid #E8FAF3' }}>{u.av}</div>
                                <h2 style={{ fontFamily: 'Playfair Display,serif', fontSize: 20, marginBottom: 4 }}>{u.name}</h2>
                                <div style={{ marginBottom: 4 }}><span className="stars" style={{ fontSize: 16 }}>{'★'.repeat(5)}</span></div>
                                <div style={{ fontSize: 13, color: '#aaa', marginBottom: 16 }}>{u.rating} · {u.reviews} reviews</div>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center', marginBottom: 16 }}>{u.skills.map(s => <span key={s} className="tag" style={{ fontSize: 12 }}>{s}</span>)}</div>
                                <p style={{ fontSize: 13, color: '#777', lineHeight: 1.6 }}>{u.bio}</p>
                            </div>
                            <div className="card-flat" style={{ padding: 20 }}>
                                {[{ l: 'Member since', v: u.since }, { l: 'Tasks done', v: u.completed }, { l: 'Earnings', v: u.earnings }, { l: 'Response time', v: '< 2 min' }].map(s => (
                                    <div key={s.l} className="between" style={{ padding: '10px 0', borderBottom: '1px solid #f5f5f5', fontSize: 14 }}>
                                        <span style={{ color: '#aaa' }}>{s.l}</span><strong style={{ color: '#1a1a2e' }}>{s.v}</strong>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div>
                            <div style={{ display: 'flex', gap: 0, marginBottom: 28, borderBottom: '1px solid #f0f0f0' }}>
                                {['tasks', 'reviews'].map(t => (
                                    <button key={t} onClick={() => setTab(t)}
                                        style={{ background: 'none', border: 'none', padding: '12px 24px', fontSize: 14, fontWeight: tab === t ? 600 : 400, color: tab === t ? '#00A870' : '#888', borderBottom: tab === t ? '2px solid #00A870' : '2px solid transparent', cursor: 'pointer', fontFamily: 'DM Sans,sans-serif', transition: 'all 0.18s', textTransform: 'capitalize' }}>
                                        {t === 'tasks' ? `My Tasks (${TASKS.slice(0, 5).length})` : `Reviews (${REVIEWS.length})`}
                                    </button>
                                ))}
                            </div>
                            {tab === 'tasks' && <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                                {TASKS.slice(0, 5).map(t => (
                                    <div key={t.id} className="card-flat" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px' }}>
                                        <div><div style={{ fontWeight: 600, fontSize: 14, color: '#1a1a2e', marginBottom: 4 }}>{t.title}</div><div style={{ fontSize: 12, color: '#aaa' }}>{t.cat} · Due {t.deadline}</div></div>
                                        <div style={{ textAlign: 'right' }}><div style={{ color: '#00A870', fontWeight: 600, fontSize: 15 }}>PKR {t.budget.toLocaleString()}</div><span className="badge b-green" style={{ fontSize: 11, marginTop: 4 }}>Open</span></div>
                                    </div>
                                ))}
                            </div>}
                            {tab === 'reviews' && <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                                {REVIEWS.map((rv, i) => (
                                    <div key={i} className="card-flat" style={{ padding: '20px 22px' }}>
                                        <div className="between" style={{ marginBottom: 12 }}>
                                            <div className="row"><div className="av" style={{ width: 36, height: 36, fontSize: 13 }}>{rv.av}</div><div><div style={{ fontWeight: 600, fontSize: 14 }}>{rv.name}</div><div style={{ fontSize: 11, color: '#aaa' }}>{rv.task} · {rv.date}</div></div></div>
                                            <div className="stars" style={{ fontSize: 13 }}>{'★'.repeat(rv.r)}</div>
                                        </div>
                                        <p style={{ fontSize: 14, color: '#555', lineHeight: 1.6 }}>{rv.text}</p>
                                    </div>
                                ))}
                            </div>}
                        </div>
                    </div>
                </div>
            );
        }

        /* ══ SAVED ══ */
        function Saved({ setPage, setTask, saved, onSave, showToast }) {
            const list = TASKS.filter(t => saved.includes(t.id));
            return (
                <div className="page" style={{ maxWidth: 1000, margin: '0 auto', padding: '44px 48px' }}>
                    <div style={{ marginBottom: 28 }}><h1 style={{ fontFamily: 'Playfair Display,serif', fontSize: 30, marginBottom: 4 }}>Saved Tasks</h1><p style={{ color: '#999', fontSize: 14 }}>{list.length} tasks saved</p></div>
                    {list.length === 0 ? (
                        <div style={{ textAlign: 'center', padding: '80px 20px', color: '#aaa' }}>
                            <div style={{ fontSize: 48, marginBottom: 16 }}>🔖</div>
                            <p style={{ fontSize: 16, marginBottom: 16 }}>No saved tasks yet</p>
                            <button className="btn btn-green" onClick={() => setPage('feed')}>Browse Tasks</button>
                        </div>
                    ) : (
                        <div className="grid2">{list.map(t => <TaskCard key={t.id} task={t} onView={t => { setTask(t); setPage('detail'); }} onSave={id => { onSave(id); showToast('Removed from saved', '🗑️'); }} saved={saved} />)}</div>
                    )}
                </div>
            );
        }

        /* ══ ADMIN ══ */
        function Admin() {
            const [tab, setTab] = useState('overview');
            const stats = [{ l: 'Total Users', v: '1,240', icon: '👥', trend: '+12%' }, { l: 'Active Tasks', v: '87', icon: '📋', trend: '+5%' }, { l: 'Completed', v: '2,410', icon: '✅', trend: '+23%' }, { l: 'Revenue (PKR)', v: '4.2L', icon: '💰', trend: '+18%' }];
            return (
                <div className="page" style={{ maxWidth: 1060, margin: '0 auto', padding: '44px 48px' }}>
                    <div style={{ marginBottom: 32 }}><div style={{ fontSize: 12, color: '#00A870', fontWeight: 500, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6 }}>Admin Panel</div><h1 style={{ fontFamily: 'Playfair Display,serif', fontSize: 30 }}>Dashboard</h1></div>
                    <div className="grid4" style={{ marginBottom: 32 }}>
                        {stats.map(s => (
                            <div key={s.l} className="card-flat" style={{ padding: 22 }}>
                                <div className="between" style={{ marginBottom: 12 }}><div style={{ fontSize: 24 }}>{s.icon}</div><span className="badge b-green">{s.trend}</span></div>
                                <div style={{ fontFamily: 'Playfair Display,serif', fontSize: 30, color: '#1a1a2e', fontWeight: 600 }}>{s.v}</div>
                                <div style={{ fontSize: 13, color: '#888', marginTop: 4 }}>{s.l}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ display: 'flex', gap: 0, marginBottom: 24, borderBottom: '1px solid #f0f0f0' }}>
                        {['overview', 'users', 'tasks'].map(t => (
                            <button key={t} onClick={() => setTab(t)} style={{ background: 'none', border: 'none', padding: '10px 24px', fontSize: 14, fontWeight: tab === t ? 600 : 400, color: tab === t ? '#00A870' : '#888', borderBottom: tab === t ? '2px solid #00A870' : '2px solid transparent', cursor: 'pointer', fontFamily: 'DM Sans,sans-serif', textTransform: 'capitalize' }}>
                                {t === 'overview' ? 'Overview' : t === 'users' ? `Users (${USERS.length})` : `Tasks (${TASKS.length})`}
                            </button>
                        ))}
                    </div>
                    {(tab === 'overview' || tab === 'tasks') && (
                        <div className="card-flat" style={{ marginBottom: 20 }}>
                            <h3 style={{ fontWeight: 600, fontSize: 15, marginBottom: 16 }}>Recent Tasks</h3>
                            <table style={{ width: '100%', fontSize: 13, borderCollapse: 'collapse' }}>
                                <thead><tr style={{ borderBottom: '1px solid #f0f0f0' }}>{['Task', 'Category', 'Budget', 'Distance', 'Status'].map(h => <th key={h} style={{ textAlign: 'left', padding: '8px 12px 12px', color: '#aaa', fontWeight: 500 }}>{h}</th>)}</tr></thead>
                                <tbody>{TASKS.slice(0, 6).map(t => (
                                    <tr key={t.id} style={{ borderBottom: '1px solid #f8f8f8' }}>
                                        <td style={{ padding: '12px', color: '#1a1a2e', fontWeight: 500 }}>{t.title.slice(0, 38)}…</td>
                                        <td style={{ padding: '12px' }}><span className="badge b-gray">{t.cat}</span></td>
                                        <td style={{ padding: '12px', color: '#00A870', fontWeight: 600 }}>PKR {t.budget.toLocaleString()}</td>
                                        <td style={{ padding: '12px', color: '#888' }}>{t.dist} km</td>
                                        <td style={{ padding: '12px' }}><span className="badge b-green">Open</span></td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        </div>
                    )}
                    {(tab === 'overview' || tab === 'users') && (
                        <div className="card-flat">
                            <h3 style={{ fontWeight: 600, fontSize: 15, marginBottom: 16 }}>Top Providers</h3>
                            {USERS.map(u => (
                                <div key={u.id} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 0', borderBottom: '1px solid #f5f5f5' }}>
                                    <div className="av" style={{ width: 42, height: 42, fontSize: 15 }}>{u.av}</div>
                                    <div style={{ flex: 1 }}><div style={{ fontWeight: 600, fontSize: 14, color: '#1a1a2e', marginBottom: 2 }}>{u.name}</div><div style={{ fontSize: 12, color: '#aaa' }}>{u.completed} tasks · {u.skills.slice(0, 2).join(', ')}</div></div>
                                    <div className="stars" style={{ fontSize: 13 }}>{u.rating} ★</div>
                                    <span className="badge b-green">Verified</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        /* ══ LOGIN ══ */
        function Login({ setPage, showToast }) {
            const [mode, setMode] = useState('login');
            const [role, setRole] = useState('customer');
            const [step, setStep] = useState(1);
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState(['', '', '', '', '', '']);
            const handleOtp = (i, v) => { const n = [...otp]; n[i] = v.slice(-1); setOtp(n); if (v && i < 5) document.getElementById(`otp${i + 1}`)?.focus(); };
            return (
                <div className="auth-wrap">
                    <div className="auth-card">
                        <div style={{ textAlign: 'center', marginBottom: 28 }}>
                            <div style={{ fontFamily: 'Playfair Display,serif', fontSize: 26, color: '#00A870', fontWeight: 700, marginBottom: 16 }}>Nexo.</div>
                            {step === 1 && <><h2 style={{ fontFamily: 'Playfair Display,serif', fontSize: 22, marginBottom: 6 }}>{mode === 'login' ? 'Welcome back' : 'Create account'}</h2><p style={{ fontSize: 14, color: '#999' }}>{mode === 'login' ? 'Sign in to your Nexo account' : 'Join Nexo — it\'s free'}</p></>}
                            {step === 2 && <><h2 style={{ fontFamily: 'Playfair Display,serif', fontSize: 22, marginBottom: 6 }}>Verify your phone</h2><p style={{ fontSize: 14, color: '#999' }}>We sent a 6-digit code to {phone}</p></>}
                        </div>
                        {step === 1 && <>
                            {mode === 'signup' && (
                                <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
                                    {['customer', 'provider'].map(r => (
                                        <button key={r} onClick={() => setRole(r)} style={{ flex: 1, padding: '10px', border: `2px solid ${role === r ? '#00A870' : '#e0e0e0'}`, borderRadius: 12, background: role === r ? '#E8FAF3' : '#fff', color: role === r ? '#00924a' : '#555', fontSize: 13, fontWeight: role === r ? 600 : 400, cursor: 'pointer', fontFamily: 'DM Sans,sans-serif', textTransform: 'capitalize', transition: 'all 0.18s' }}>
                                            {r === 'customer' ? '🙋 Customer' : '🔧 Provider'}
                                        </button>
                                    ))}
                                </div>
                            )}
                            {mode === 'signup' && <div className="fg"><label className="flabel">Full Name</label><input className="finput" placeholder="Ali Hassan" /></div>}
                            <div className="fg"><label className="flabel">Phone Number</label><input className="finput" placeholder="+92 300 0000000" value={phone} onChange={e => setPhone(e.target.value)} /></div>
                            <div className="fg"><label className="flabel">Password</label><input className="finput" type="password" placeholder="••••••••" /></div>
                            <button className="btn btn-green btn-full" style={{ padding: '14px', fontSize: 15, borderRadius: 14, marginTop: 8 }} onClick={() => { if (phone) { setStep(2); } else showToast('Enter your phone number', '📱'); }}>
                                {mode === 'login' ? 'Sign In →' : 'Continue →'}
                            </button>
                            <div className="div" />
                            <p style={{ textAlign: 'center', fontSize: 13, color: '#999' }}>{mode === 'login' ? 'New to Nexo? ' : 'Already have an account? '}<span style={{ color: '#00A870', cursor: 'pointer', fontWeight: 600 }} onClick={() => setMode(mode === 'login' ? 'signup' : 'login')}>{mode === 'login' ? 'Create account' : 'Sign in'}</span></p>
                        </>}
                        {step === 2 && <>
                            <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginBottom: 24 }}>
                                {otp.map((v, i) => (
                                    <input key={i} id={`otp${i}`} style={{ width: 46, height: 52, textAlign: 'center', fontSize: 20, fontWeight: 600, border: '2px solid #e0e0e0', borderRadius: 12, outline: 'none', fontFamily: 'DM Sans,sans-serif', color: '#1a1a2e', transition: 'border 0.18s' }}
                                        maxLength={1} value={v} onChange={e => handleOtp(i, e.target.value)}
                                        onFocus={e => { e.target.style.borderColor = '#00A870'; }} onBlur={e => { e.target.style.borderColor = '#e0e0e0'; }} />
                                ))}
                            </div>
                            <button className="btn btn-green btn-full" style={{ padding: '14px', fontSize: 15, borderRadius: 14 }} onClick={() => { showToast('Signed in successfully!', '🎉'); setPage('feed'); }}>Verify & Continue</button>
                            <div style={{ textAlign: 'center', marginTop: 16 }}><span style={{ fontSize: 13, color: '#aaa' }}>Didn't get it? </span><span style={{ fontSize: 13, color: '#00A870', cursor: 'pointer', fontWeight: 600 }} onClick={() => showToast('Code resent!', '📱')}>Resend</span></div>
                            <button onClick={() => setStep(1)} style={{ display: 'block', margin: '14px auto 0', background: 'none', border: 'none', fontSize: 13, color: '#aaa', cursor: 'pointer', fontFamily: 'DM Sans,sans-serif' }}>← Change number</button>
                        </>}
                    </div>
                </div>
            );
        }

        /* ══ CONTROLLER / APP ══ */
        function App() {
            const [page, setPage] = useState('home');
            const [task, setTask] = useState(null);
            const [saved, setSaved] = useState([]);
            const { toast, show: showToast } = useToast();
            const onSave = id => setSaved(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
            const render = () => {
                switch (page) {
                    case 'home': return <Home setPage={setPage} setTask={setTask} showToast={showToast} />;
                    case 'feed': return <Feed setPage={setPage} setTask={setTask} saved={saved} onSave={onSave} showToast={showToast} />;
                    case 'detail': return <Detail task={task} setPage={setPage} saved={saved} onSave={onSave} showToast={showToast} />;
                    case 'post': return <PostTask setPage={setPage} showToast={showToast} />;
                    case 'profile': return <Profile showToast={showToast} />;
                    case 'saved': return <Saved setPage={setPage} setTask={setTask} saved={saved} onSave={onSave} showToast={showToast} />;
                    case 'admin': return <Admin />;
                    case 'login': return <Login setPage={setPage} showToast={showToast} />;
                    default: return <Home setPage={setPage} setTask={setTask} showToast={showToast} />;
                }
            };
            return (
                <div>
                    <Navbar page={page} setPage={setPage} saved={saved} />
                    {render()}
                    <Toast toast={toast} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
